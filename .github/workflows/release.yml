# GitHub Actions Release Workflow
#
# Builds and releases deck binary for multiple platforms.
# Triggered on version tag push (v*).

name: Release

on:
  push:
    tags:
      - "v*"

# Cancel in-progress runs when a new workflow with the same group name starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Determine version from tag
  metadata:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: |
          # Remove 'v' prefix if present
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

  # Build binaries for all platforms
  build:
    name: Build (${{ matrix.target }})
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-x64
          - darwin-arm64
    runs-on: ${{ matrix.target == 'darwin-x64' || matrix.target == 'darwin-arm64' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.1"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate build info
        run: |
          bun scripts/generate-build-info.ts \
            --version "${{ needs.metadata.outputs.version }}" \
            --target "${{ matrix.target }}"

      - name: Generate skill bundle
        run: bun scripts/generate-skill-bundle.ts

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          bun build --compile \
            --target=bun-${TARGET} \
            --outfile=./deck-${TARGET} \
            ./apps/cli/src/main.tsx

      - name: CodeSign macOS binary
        if: matrix.target == 'darwin-x64' || matrix.target == 'darwin-arm64'
        run: |
          # Skip code signing in CI - would require certificates
          echo "Skipping code signing in CI"

      - name: Create archive
        run: |
          ARCHIVE_NAME="deck_v${VERSION}_${TARGET}.tar.gz"
          tar -czf "${ARCHIVE_NAME}" --absolute-names ./deck-${TARGET}

      - name: Compute checksum
        run: |
          if [[ "${{ matrix.target }}" == linux* ]]; then
            sha256sum deck_v${VERSION}_${TARGET}.tar.gz > checksums.txt
          else
            shasum -a 256 deck_v${VERSION}_${TARGET}.tar.gz > checksums.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-${{ matrix.target }}
          path: |
            deck_v${VERSION}_${{ matrix.target }}.tar.gz
            checksums.txt

  # Create GitHub Release
  release:
    name: Create release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          mv artifacts/deck-*/* release-assets/
          ls -la release-assets/

      - name: Create_checksums_combined
        run: |
          # Combine individual checksums into one file
          cat release-assets/checksums.txt > checksums.txt
          cat release-assets/deck-*/checksums.txt >> checksums.txt
          mv checksums.txt release-assets/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.version }}
          name: Deck v${{ needs.metadata.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.metadata.outputs.version, '-beta') || contains(needs.metadata.outputs.version, '-alpha') }}
          generate_release_notes: true
          files: |
            release-assets/deck_v*_linux-x64.tar.gz
            release-assets/deck_v*_linux-arm64.tar.gz
            release-assets/deck_v*_darwin-x64.tar.gz
            release-assets/deck_v*_darwin-arm64.tar.gz
            release-assets/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Verify release was created
  verify:
    name: Verify release
    needs: [metadata, release]
    runs-on: ubuntu-latest
    steps:
      - name: Verify release exists
        run: |
          # Query the release API to verify it was created
          curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.metadata.outputs.version }}" | \
            jq -e '.id' > /dev/null
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}