# GitHub Actions Release Workflow
#
# Builds and releases deck binary for multiple platforms.
# Triggered on:
#   - Push to main (automatic build, pre-release)
#   - Version tag push v* (stable release)

name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

# Cancel in-progress runs when a new workflow with the same group name starts
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Determine version from tag or build type
  metadata:
    name: Extract version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.tag.outputs.version }}
      is_release: ${{ steps.tag.outputs.is_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: tag
        run: |
          # Check if this is a tag push or main push
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            echo "is_release=true" >> $GITHUB_OUTPUT
          else
            # For main pushes, use package.json version with suffix
            VERSION=$(node -p "require('./package.json').version")
            echo "is_release=false" >> $GITHUB_OUTPUT
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
        shell: bash

  # Build binaries for all platforms
  build:
    name: Build (${{ matrix.target }})
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        target:
          - linux-x64
          - linux-arm64
          - darwin-arm64
    runs-on: ${{ matrix.target == 'darwin-x64' || matrix.target == 'darwin-arm64' && 'macos-latest' || 'ubuntu-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install

      - name: Generate build info
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          bun scripts/generate-build-info.ts \
            --version "$VERSION" \
            --target "$TARGET"

      - name: Generate skill bundle
        run: bun scripts/generate-skill-bundle.ts

      - name: Build binary
        env:
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist-cli
          bun build --compile \
            --target=bun-${TARGET} \
            --outfile=./dist-cli/deck \
            ./apps/cli/src/main.tsx

      - name: Create archive
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          ARCHIVE_NAME="deck_v${VERSION}_${TARGET}.tar.gz"
          tar -czf "${ARCHIVE_NAME}" -C dist-cli deck

      - name: Compute checksum
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          ARCHIVE_NAME="deck_v${VERSION}_${TARGET}.tar.gz"
          if command -v sha256sum &>/dev/null; then
            sha256sum "${ARCHIVE_NAME}" > checksums.txt
          else
            shasum -a 256 "${ARCHIVE_NAME}" > checksums.txt
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-${{ matrix.target }}
          path: |
            deck_v${{ needs.metadata.outputs.version }}_${{ matrix.target }}.tar.gz
            checksums.txt

  # Create GitHub Release
  release:
    name: Create release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.metadata.outputs.is_release == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          # Move only the tar.gz archives, skip checksums.txt (we concatenate them below)
          mv artifacts/deck-*/deck_v*.tar.gz release-assets/
          ls -la release-assets/

      - name: Create checksums combined
        run: |
          cat artifacts/deck-*/checksums.txt > release-assets/checksums.txt

      - name: Generate release descriptor
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          ASSET_BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"
          bun run scripts/prepare-release.ts \
            --non-interactive \
            --version "${VERSION#v}" \
            --tag "${VERSION}" \
            --channel stable \
            --from-assets-dir release-assets \
            --asset-base-url "${ASSET_BASE_URL}" \
            --out release-assets/release.json
          cat release-assets/release.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.version }}
          name: Deck v${{ needs.metadata.outputs.version }}
          draft: false
          prerelease: ${{ contains(needs.metadata.outputs.version, '-beta') || contains(needs.metadata.outputs.version, '-alpha') }}
          generate_release_notes: true
          files: |
            release-assets/deck_v*_linux-x64.tar.gz
            release-assets/deck_v*_linux-arm64.tar.gz
            release-assets/deck_v*_darwin-arm64.tar.gz
            release-assets/checksums.txt
            release-assets/release.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Upload pre-release artifacts (main pushes only)
  artifacts:
    name: Upload pre-release
    needs: [metadata, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: needs.metadata.outputs.is_release == 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare artifacts
        run: |
          mkdir -p release-assets
          # Move only the tar.gz archives, skip checksums.txt (we concatenate them below)
          mv artifacts/deck-*/deck_v*.tar.gz release-assets/
          ls -la release-assets/

      - name: Create checksums combined
        run: |
          cat artifacts/deck-*/checksums.txt > release-assets/checksums.txt

      - name: Generate release descriptor
        env:
          VERSION: ${{ needs.metadata.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          ASSET_BASE_URL="https://github.com/${REPO}/releases/download/build-${VERSION}"
          bun run scripts/prepare-release.ts \
            --non-interactive \
            --version "${VERSION}" \
            --tag "build-${VERSION}" \
            --channel dev \
            --from-assets-dir release-assets \
            --asset-base-url "${ASSET_BASE_URL}" \
            --out release-assets/release.json
          cat release-assets/release.json

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "build-${{ needs.metadata.outputs.version }}"
          name: "Deck v${{ needs.metadata.outputs.version }} (pre-release)"
          draft: true
          prerelease: true
          generate_release_notes: false
          files: |
            release-assets/deck_v*_linux-x64.tar.gz
            release-assets/deck_v*_linux-arm64.tar.gz
            release-assets/deck_v*_darwin-arm64.tar.gz
            release-assets/checksums.txt
            release-assets/release.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
