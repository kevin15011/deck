schema: spec-registry-events-v1
events:
  - phase: explore
    status: completed
    event: explore.completed
    artifact: exploration.md
    timestamp: 2026-06-22
    actor: deck-developer-explorer
    summary: >
      Completed exploration for bounded Developer Team repair loops, identifying
      evidence from the previous release-gate repair loop and recommending a
      runner-agnostic scope covering budgets, structured manifests, staged
      verification, repair incidents, generated-artifact policy, and Apply/Verify
      handoff quality.
