  - phase: tasks
    status: repaired
    event: tasks.boundary_repaired
    artifact: tasks.md
    timestamp: 2026-06-22
    actor: deck-developer-task
    registry_write: non-deferred
    notes:
      - >
        Repaired OpenSpec artifacts before Apply to enforce the user clarification
        boundary: Deck does NOT own, install, generate, or manage OpenCode
        commands named sdd-* (including sdd-apply, sdd-verify, sdd-continue);
        Deck retains Developer Team subagents/skills (deck-developer-*); existing
        installed sdd-* user files are not deleted by Deck; cleanup of legacy
        installed files is user/manual or a separately authorized change.
      - >
        Updated design.md by adding a Boundary Clarification section near the top
        and replacing each adapter-side repair-incident surface prescription with
        a boundary assertion (Stage 4 row, Component/Module Boundaries
        command-generation.ts row, API/Contract Implications OpenCode commands
        row, File Impact Estimate command-generation.ts row, Testing Strategy
        adapter command-generation tests bullet, Rollout step 3, and Mermaid
        diagram). Updated Current Architecture Context line about
        command-generation.ts to reflect that Deck does not generate sdd-*
        commands going forward.
      - >
        Updated tasks.md by replacing Task 10 (formerly "Update OpenCode adapter
        command generation to surface repair-incident context") with a boundary
        correction task ("Enforce Developer Team install boundary — no sdd-*
        command generation"); updated Task 11 to drop the adapter sdd-*
        integration dependency; updated dependency graph, parallelization plan,
        responsibility contracts, complexity summary, review workload forecast,
        Open Questions Q5, and Mermaid diagram to reflect the boundary.
      - >
        Updated apply-progress.md by adding a Boundary Clarification section
        near the top summarizing the user clarification and the artifact
        repairs performed before Apply.
      - >
        Updated state.yaml by setting currentPhase tasks and status repaired,
        and by appending a boundary-repair provenance entry while preserving
        all prior provenance. Appended this event to events.yaml while
        preserving all prior events. No product code, tests, package files,
        installed OpenCode files, or git state modified; no installed files
        deleted.
