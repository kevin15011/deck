decisions:
  adaptive_memory_options:
    status: confirmed
    value:
    - None
    - Engram
    - Supermemory
    note: Single-choice global Adaptive Memory; no memory provider active by default.
  engram_installability:
    status: confirmed
    value: Engram/engram-memory appears as installable/actionable only when Adaptive
      Memory = Engram is selected.
  mermaid_requirement:
    status: confirmed
    value: Mermaid is mandatory as a runner capability; Pi implements it via pi-mermaid,
      while OpenCode needs its own implementation mapping. Do not conflate the global
      Mermaid capability with the pi-mermaid package/tool.
  pi_hud_scope:
    status: confirmed
    value: pi-hud is optional and applies only within the Pi runner experience.
