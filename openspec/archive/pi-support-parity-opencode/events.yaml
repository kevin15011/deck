## 2026-06-09 — Repair Pass #25: developer-team-install idempotency/verification/rollback fix

- **Fase**: apply
- **Estado**: repair_25_completed
- **Artefacto**: `apply-progress.md`, `state.yaml`
- **Agente**: deck-developer-apply-backend
- **Evento**: repair-25-completed
- **Resumen**: Reparación de 7 tests fallando en developer-team-install.test.ts relacionados a idempotency, verification y rollback de skills.

### Problema Identificado

1. **Síntoma**: 7 tests fallando
   - idempotency: archivos no reportados como unchanged en segunda apply
   - verification: archivos de skills no existían después de apply
   - rollback: no había archivos para hacer rollback
   - "catches corrupted skill files": ENOENT intentando abrir archivo que no existía

2. **Causa Raíz**: Función `cleanupNestedSkillDirectories()` en línea 700 de developer-team-install.ts
   - Borraba directorios de skills justo después de ser creados
   - La función verificaba: `if (entry.isDirectory())` para cualquier directorio conteniendo SKILL.md
   - Esto coincidía con la estructura CORRECTA `.pi/skills/{skillId}/SKILL.md`
   - Solo debería borrar la estructura ANTIGUA incorrecta: `.pi/skills/SKILL.md/SKILL.md` (directorio literalmente llamado "SKILL.md")

### Fix Aplicado

```typescript
// Antes (incorrecto):
if (entry.isDirectory()) {
  const nestedPath = join(skillsDir, entry.name, "SKILL.md");
  if (exists(nestedPath)) { ... }
}

// Después (correcto):
if (entry.isDirectory() && entry.name === "SKILL.md") {
  const nestedPath = join(skillsDir, entry.name, "SKILL.md");
  if (exists(nestedPath)) { ... }
}
```

### Contrato Final de Paths

| Tipo | Path |
|------|------|
| Profile | `{projectRoot}/.deck/pi/profiles/{teamId}/system-prompt.md` |
| Skills | `{projectRoot}/.pi/skills/{skillId}/SKILL.md` |
| Agentes | `{projectRoot}/.pi/agents/{agentId}.md` |

