## 2026-06-05 — Repair Pass #6: Pi packages TUI navigation/selection bug fix

- **Fase**: apply
- **Estado**: repair_6_completed
- **Artefacto**: `apply-progress.md`, `state.yaml`
- **Agente**: deck-developer-apply-frontend
- **Evento**: repair-6-completed
- **Resumen**: Reparación de bug reportado por usuario en TUI de paquetes Pi:
  1. Cursor no podía llegar a "Back to dashboard" (off-by-one en hardcoded packageCount=5)
  2. Space en último paquete seleccionaba el penúltimo (index mismatch entre UI y handlers)
- **Causa raíz**:
  - reducer usaba packageCount hardcodeado (5) pero Pi tiene 6 toggleables
  - getDashboardToggleAction usaba todos los IDs (7) en lugar de toggleables (6)
  - getDashboardContinueEffect verificaba back en índice incorrecto (7 vs 6)
- **Archivos modificados**:
  - selectors.ts: +getToggleableCapabilityIds()
  - input-handler.ts: getDashboardToggleAction, getDashboardContinueEffect
  - reducer.ts: +cursor-up-with-limit, +cursor-down-with-limit, withClampedCursor
  - app.tsx: dashboardToggleableCount, cursor handling
- **Tests**: input-handler 4 pass, reducer 10 pass / 2 fail (pre-existentes)
- **Verificación manual**:
  1. `deck pi` → Packages → verificar navegación con ↓ hasta "Back to dashboard"
  2. Verificar Space selecciona paquete correcto (no el anterior)
  3. Enter en "Back to dashboard" vuelve al dashboard
- **Próximo paso**: Listo para Verify/Review si se requiere

