## 2026-06-09 — Repair #18: Fix installPiTools dispatch by installKind

- **Fase**: apply-repair
- **Estado**: repair_18_completed
- **Artefacto**: `install-tools.ts` (modificado), `runner-adapter.ts` (modificado), `install-tools.test.ts` (actualizado), `apply-progress.md` (actualizado), `state.yaml` (actualizado)
- **Agente**: deck-developer-apply-backend
- **Registro**: phase=apply, agent=backend, status=repair-18-completed
- **Evento**: repair-18-completed

### Problema reportado
- Repair #17 preservó installKind en runner-adapter.ts PERO installPiTools() ignoraba completamente installKind
- installPiTools siempre ejecutaba `pi install <source>` sin importar el tipo de tool
- Cuatro acciones fallaban: context-mode, codebase-memory-mcp, rtk, serena
- Log mostraba "Dispatching tool=X, installKind=Y" pero después ejecutaba siempre "pi install"

### Causa raíz
1. installPiTools() en install-tools.ts líneas 39-100 NO tenía lógica de dispatch
2. Siempre usaba: `await runInstallCommand(command, ["install", tool.source])`
3. Ignoraba: shared-binary, shared-binary-plus-mcp, python-tool, npm-package-plus-mcp
4. Result statuses (reused, installed, manual-verified) se mapearon incorrectamente a "failed"

### Reparaciones ejecutadas

1. **Nueva función dispatchInstallByKind (D-1)** ✅
   - Archivo: `packages/adapter-pi/src/install-tools.ts`
   - Nueva función que hace dispatch basado en installKind:
     - shared-binary, shared-binary-plus-mcp: usa installSharedBinary() con healthcheck
     - python-tool: usa installSerena() (uv/pipx)
     - npm-package-plus-mcp: ejecuta `npx -y <package>`
     - pi-package: ejecuta `pi install <source>`
     - external, manual: retorna status "manual" (no falla)

2. **Mapeo de statuses corregido (S-1)** ✅
   - Estados exitosos: installed, reused, manual-verified, manual → NO son "failed"
   - Estados de fallo: failed, blocked → sí son "failed"
   - Actualizado runner-adapter.ts para mapear correctamente

3. **Logging mejorado (L-1)** ✅
   - Cada dispatch ahora loggea: `[install-tools] Dispatching tool=X, installKind=Y, source=Z`
   - Agregados campos installKind y exitCode al resultado para diagnostics

4. **Tests agregados (T-1)** ✅
   - 8 nuevos tests en install-tools.test.ts verificando:
     - shared-binary retorna "reused" cuando binary ya está listo
     - shared-binary-plus-mcp para context-mode retorna "reused" cuando binary listo
     - shared-binary-plus-mcp para codebase-memory-mcp retorna "reused"
     - python-tool retorna "reused" cuando serena ya está lista
     - python-tool retorna "manual-verified" cuando uv/pipx no disponible
     - npm-package-plus-mcp ejecuta npx correctamente
     - pi-package usa comando pi install
     - Dispatch loggea tool y installKind

