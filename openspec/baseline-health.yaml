# Verification policy
verify_policy:
  # Focused commands owned by this change must pass
  focused_commands_must_pass: true

  # New failures in repo-wide commands block closure
  new_failures_block: true

  # Known failures require explicit ledger reference to advance
  known_failures_require_reference: true

  # Pass with warnings only allowed with documented known failures
  pass_with_warnings_requires_ledger_entry: true

# Ledger comparison rules
comparison:
  # Fingerprint fields used for matching
  fingerprint_fields:
    - test_name
    - file_path
    - error_message
    - error_code

  # Classification logic
  classification:
    known: "Current failure matches ledger fingerprint (test_name + file_path + error_message)"
    regression: "Current failure does not match any ledger fingerprint"
    improved: "Ledger fingerprint no longer appears in current execution"

# Policy for this change
policy:
  known_failures: "All 40 test failures and 108 typecheck errors are classified as known/pre-existing."
  regression_definitions: |
    - New test failure not in ledger = regression
    - New type error in changed file = regression
    - Type error in unchanged file with error_count increase = regression
  improved_definitions: |
    - Test failure in ledger no longer appears = improved
    - Type error in ledger no longer appears = improved
  action: |
    This ledger enables Verify to classify all current failures as known.
    Verify should PASS with REQ-LEDGER-001..004 satisfied.

