changeId: fix-install-upgrade-regressions
events:
  - phase: explore
    event: investigation_completed
    timestamp: 2026-06-03
    artifact: exploration.md
    summary: >
      Investigated two regressions observed in Deck 0.1.3.

      Bug 1 (install, serena + any source != id capability): root cause is
      in apps/cli/src/tui/app.tsx installPackages callback. The callback
      uses packages[i].name (= action.source, e.g. "oraios/serena") as the
      catalog lookup key against OPENCODE_INSTALLABLE_TOOLS, whose id is
      the catalog id (e.g. "serena"). The filter matches zero rows, the
      callback short-circuits to success: true with "already installed",
      and action-runner.runPackageInstall then reports "Installed
      oraios/serena." (line 271) because no per-package result failed.
      MCP config write succeeds independently, so the user ends up with
      an opencode.json entry pointing at a binary that was never
      installed. This is a class of bug (serena, context7, and any
      future capability whose catalog source != id).

      Bug 2 (TUI "No upgrade available."): the TUI's release-check
      useEffect (app.tsx:480-499) fires once on mount. The "none" branch
      in addLog (line 1195) only fires when toReleaseCheckState returns
      {kind: "none"}, which only happens when compareVersions(current,
      latest) >= 0. The comparator itself is correct for 0.1.3 vs 0.1.4
      or 0.1.10. The most likely root cause is upstream data: the
      published release on GitHub either lacks release.json (legacy
      fallback) or has a descriptor.version that disagrees with tag_name
      (or tag_name was re-used). A small hardening
      (fetchReleaseDescriptor cross-checks descriptor.version against
      tag_name) would catch the common data bug; the TUI's fire-once
      check with no manual refresh is a secondary UX gap to address in a
      follow-up change.

      Recommended next phase: proposal with a primary install-regression
      fix (use catalog id for the OPENCODE_INSTALLABLE_TOOLS lookup,
      pass both id and source from the action-runner) and a secondary
      upgrade-regression hardening (cross-check descriptor.version vs
      tag_name).
  - phase: proposal
    event: proposal_completed
    timestamp: 2026-06-03
    artifact: proposal.md
    summary: >
      Proposed a contract-level fix for OpenCode tool installation so
      catalog id and source/module are carried separately, no-match install
      requests fail honestly, and MCP config is not written after a false
      install. Also proposed release-check hardening that validates
      descriptor.version against tag_name and falls back to tag-derived
      legacy release data when descriptor metadata is inconsistent. Manual
      update refresh remains a follow-up UX option.
  - phase: spec
    event: spec_completed
    timestamp: 2026-06-03
    artifact: spec.md
    summary: >
      Defined requirements for catalog-id based installation, honest zero-match
      failures, MCP dependency gating, executable validation, and release
      descriptor/tag cross-validation with legacy fallback.
  - phase: design
    event: design_completed
    timestamp: 2026-06-03
    artifact: design.md
    summary: >
      Designed action-runner/TUI installer contract changes, no-match failure
      handling, MCP write gating after failed installs, and release-check
      fallback behavior for stale or inconsistent descriptors.
  - phase: tasks
    event: tasks_completed
    timestamp: 2026-06-03
    artifact: tasks.md
    summary: >
      Created 6 atomic tasks in 4 groups. Install path (Tasks 1-3, 5):
      PackageInstallerFn contract extension, installPackages catalog id
      lookup + no-match failure, MCP write gating after failed installs,
      install regression tests. Upgrade path (Tasks 4, 6): descriptor/tag
      cross-validation + legacy fallback hardening, release-check regression
      tests. Two domains are fully independent and can be applied in parallel.
      All tasks routed to General Apply. No blockers.
  - phase: apply
    event: apply_completed
    timestamp: 2026-06-03
    artifact: apply-progress.md
    summary: >
      Implemented all 6 tasks in one coherent batch. Tasks 1-3: Extended
      PackageInstallerFn contract with id field, fixed installPackages callback
      to use catalog id for lookup and return honest failure for zero matches,
      added MCP gating after failed install with executable validation. Task 4:
      Added descriptor/tag cross-validation in fetchReleaseDescriptor with
      legacy fallback hardening. Tasks 5-6: Created regression tests for both
      install and upgrade paths covering source≠id lookup, no-match failure,
      MCP gating, and descriptor/tag mismatch fallback. All tests pass.
      TypeScript compiles without errors.
  - phase: apply
    event: apply_fixup_completed
    timestamp: 2026-06-03
    artifact: apply-progress.md
    summary: >
      Applied fix-up addressing Verify/Review findings: (1) Fixed REQ-UPGRADE-003:
      legacyToState now returns error state for unparseable tags like "build-abc"
      instead of {kind:"none"}. (2) Fixed cross-platform executable lookup:
      replaced Unix-only `which` with cross-platform checkExecutableExists using
      process.env.PATH. (3) Documented pre-existing test failures (50 unrelated
      to this change). (4) Confirmed build passes. All install/upgrade
      regression tests pass (39 tests).
  - phase: apply
    event: apply_fixup2_completed
    timestamp: 2026-06-03
    artifact: apply-progress.md
    summary: >
      Fixed TypeScript error at app.tsx(798,33): Argument of type 'string' is not
      assignable to parameter of type 'InstallableOpenCodeToolId'. Fixed by explicitly
      typing matchedIds as Set<string> instead of inferred Set<InstallableOpenCodeToolId>.
      Build passes, targeted tests pass (action-runner.test.ts: 9/9, github-release.test.ts: 30/30).
  - phase: verify
    event: verify-passed
    timestamp: 2026-06-03
    artifact: verify-report.md
    summary: >
      Verified all six tasks complete, targeted install/upgrade regression tests
      pass (39/39), build passes, and the changed-file TypeScript error is
      fixed. Remaining full-suite/typecheck failures are unrelated pre-existing
      repository debt.
  - phase: review
    event: review_completed
    timestamp: 2026-06-03
    artifact: review-report.md
    summary: >
      Final review approved the implementation with no blocker or major
      findings. Remaining minor/nit findings are non-blocking follow-ups.
  - phase: archive
    event: archive_completed
    timestamp: 2026-06-03
    artifact: archive-report.md
    summary: >
      Change archived successfully. Produced traceability report linking all
      10 requirements to implementation tasks and verification results.
      Review approved with 5 minor follow-ups. Conventional commit type is
      'fix' for cli/tui install and upgrade regression fixes.
  - phase: release-bump
    event: release_bump_completed
    timestamp: 2026-06-03
    artifact: apply-progress.md
    summary: >
      Prepared release bump for Deck 0.1.4. Bumped root package version from
      0.1.3 to 0.1.4. Refreshed build-info.generated.ts using repo's standard
      mechanism (scripts/generate-build-info.ts). Release artifacts ready;
      commit/push/tag/publish deferred per user request.
