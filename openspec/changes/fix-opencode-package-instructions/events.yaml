    summary: >
      Investigated why Package Instructions are not being injected into OpenCode prompts.
      Root cause identified: opencode-launch-command.ts does not pass capabilityInstructions
      to buildOpenCodeDeveloperTeamInstallPlan, while runner-capabilities.ts correctly
