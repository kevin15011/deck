events:
  - phase: explorer
    status: completed
    timestamp: "2026-06-04T00:00:00Z"
    artifact: openspec/changes/model-reasoning-effort-capability/exploration.md
    summary: |
      Exploración completada — investigados el catálogo de modelos, ambos adaptadores (OpenCode/Pi),
      y el flujo TUI completo. Identificado que supportsThinking en cada adaptador toma decisiones
      independientes sin consultar el catálogo canónico. El campo supportsReasoning del catálogo
      está subutilizado (solo 1/25 modelos). La TUI muestra "thinking [level]" en el hint del
      agente incluso cuando el modelo no soporta reasoning. Recomendación: usar capabilities
      del catálogo como fuente de verdad con excepciones documentadas para Pi.
    findings:
      - "supportsReasoning solo definido explícitamente en 1 de 25 modelos del catálogo"
      - "supportsThinkingForOpenCodeModel es demasiado permisivo (solo excluye deepseek-v4-flash)"
      - "supportsThinkingForModel en Pi es demasiado restrictivo (excluye todo opencode-go y kimi-k2.6)"
      - "AgentModelConfigListScreen muestra 'thinking [level]' para todos los agentes sin verificar capacidad"
      - "El flujo TUI ya evita la pantalla agent-model-assignment para modelos sin thinking, pero el hint sigue mostrando el nivel"
    recommendation: |
      Opción A — usar capabilities del catálogo como fuente canónica, con excepción documentada en Pi.
      Poblar supportsReasoning explícitamente en todos los ModelEntry.
      Condicionar hints TUI por capacidad real del modelo.
