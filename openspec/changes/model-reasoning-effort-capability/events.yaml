      - "Usar catálogo de Deck como fallback cuando el runner no aporte capacidad."
      - "Default unknown/no-confirmation: no reasoning; ocultar UI y no escribir/preservar reasoningEffort."
      - "Mantener Pi support/workaround diferido, evitando regresiones."
