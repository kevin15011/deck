  summary: >-
    Fixed MenuList windowing visual/navigation bug for long model/provider lists.
    Root cause: placeholder rows used a regular space (" ") which Ink's
    Output.get() trims to an empty string via per-line trimEnd(), producing a
    trailing "\n" in the joined output. Ink's log-update then over-erases by one
    line on the next render, shifting the list and making the cursor/items
    visually disappear near the top or bottom of a long list. Fix: replace space
    placeholders with U+200B (zero-width space) which survives trimEnd() while
    rendering invisibly. Added defensive cursor clamping so the selector is
    always rendered on a valid item even with a stale cursor prop. 32/32
    menu-list tests pass (29 existing + 3 new regression tests); 37/37 effort
    tests pass. Zero typecheck/diagnostics in touched files. Backend filtering
    (auth.json reader + configured-provider filter) remains for Backend/General
    Apply.
