       d. Agregados 4 tests nuevos verificando:
          - Profile materializado en .deck/pi/profiles/<team>/system-prompt.md
          - profileStatus "created" en primera instalación
          - profileStatus "unchanged" cuando contenido es igual
          - Orchestrator stub referencia perfil sin duplicar prompt completo
    4. DECISIÓN DE LAYOUT:
       - Profile: {projectRoot}/.deck/pi/profiles/{teamId}/system-prompt.md (PROJECT-relative)
       - Skills: {projectRoot}/.pi/skills/{skillId}/SKILL.md (PROJECT-relative)
