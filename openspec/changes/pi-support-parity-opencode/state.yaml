    Repair #24 asegura materialización de perfil de equipo y valida layout de skills:
    1. PROBLEMA: Orchestrator stub referencia perfil externo pero no se materializaba durante install
    2. PROBLEMA: Advertencia ~/.pi/agent/skills vacío - skills van en proyecto .pi/skills/
    3. FIX APLICADOS:
       a. Importado materializeTeamProfile y buildTeamProfileDir en developer-team-install.ts
       b. Modificado applyDeveloperTeamInstall() para llamar materializeTeamProfile() después de escribir agentes/skills
