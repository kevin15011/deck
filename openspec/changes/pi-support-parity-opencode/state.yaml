provenance:
  initiated_by: user
  date: "2026-06-04"
  user_request: |
    Retomar soporte de Pi. OpenCode está bastante estable; llevar Pi al punto actual de OpenCode.
    Analizar paridad de paquetes y capacidades: context-mode, Serena, RTK, Context7, codebase-memory, Supermemory, otros.
    Regla: si un binario/paquete ya existe y es compartido, no reinstalar; reutilizar/verificar como OpenCode.
    Analizar agentes, skills, prompts, herramientas, configuración y estabilidad.
    Pi no tiene main agent; el prompt del orchestrator se persiste por system prompt. Explorar si es correcto.
    Primero exploración, luego definir alcance con Orchestrator antes de Proposal.
  proposal_decisions: |
    Pi debe comportarse como OpenCode sin gate adicional authenticatedRuntimeValidated para Supermemory.
    El alcance es rediseño profundo: registro first-class de capacidades/paridad por runner antes de implementación.
    Serena es obligatoria para Pi.
    Context7 debe converger hacia @upstash/context7-mcp salvo blocker de Design.
    En Pi, el system prompt/perfil es fuente de verdad actual; evitar duplicar el body completo del orchestrator en .pi/agents.
    Paquetes silenciosos runner-specific, incluyendo OpenCode Mermaid y Pi Mermaid, deben modelarse explícitamente.
  spec_design_decisions: |
    Spec y Design se ejecutaron en registry-deferred mode y el Orchestrator reconcilió el registro de forma serial.
    context-mode debe modelarse y configurarse en Pi como MCP local respaldado por binario compartido.
    El registry canónico vive en @deck/core; los adaptadores declaran/ejecutan su mapping por runner.
    Serena en Pi debe instalarse como OpenCode con fallback manual verificado, no como external-only.
    OpenCode debe declarar/consumir el registry de forma aditiva sin regresiones funcionales.
  spec_design_repairs: |
    El usuario detectó que codebase-memory y RTK no estaban suficientemente explícitos.
    Spec y Design fueron reparados para tratar codebase-memory y RTK como capacidades canónicas first-class.
    codebase-memory-mcp debe modelarse como MCP local con binario compartido, con instalación/verificación/reuso en Pi alineado con OpenCode.
    RTK debe modelarse como capacidad canónica con binario compartido, instalación/verificación/reuso y reporte de paridad por nombre.
    Los reportes/tests de paridad deben mostrar divergencias de codebase-memory y RTK explícitamente, no ocultas bajo categorías genéricas.
  tasks_decisions: |
    Numeración jerárquica F.T (1.1, 1.2, ..., 8.5) agrupada en 8 fases (Core registry, Parity resolver, Shared binary helper, OpenCode additive, Pi catalog/inventory/plan, Pi install-tools/MCP, Pi developer-team install, Tests+verification).
    26 tareas: 12 Low + 14 Medium + 0 High. Sin tareas High; las de mayor superficie (5.4, 7.2, 8.1) marcadas para split si implementación revela más carga.
    Routing mayoritario General Apply (core, contracts, tests, OpenCode additive) + Backend Apply (Pi install/MCP/prompts); sin tareas Frontend Apply específicas (cualquier superficie TUI se mantiene mínima en Task 8.4).
    Apply batching recomendado en 6 lotes (A-F): A=Core foundation, B=OC additive ∥ C+D+E=Pi cat/install/devteam, F=tests.
    Open Questions: 7 preguntas clasificadas; 2 blocking (healthcheck commands, Pi MCP server local shape) que bloquean Batch C/D; 1 allowed-with-placeholder (@upstash/context7-mcp compatibilidad); resto non-blocking.
    Review Workload Forecast: 1500-2200 líneas estimadas, riesgo 400-line budget High, sequential slices Sí, decisión previa Sí.
    Repair event de codebase-memory/RTK preservado e integrado en Tasks 1.2, 1.3, 5.1, 5.2, 6.1, 6.2, 6.4, 8.1, 8.2.
  apply_batches: |
    Batch A completado: core registry, parity resolver y helper de binarios compartidos.
    Batch B completado: OpenCode additive/no-regression mappings.
    Batch C completado: Pi catalog/inventory/install plan/MCP config foundation.
    Batch D completado: Pi install-tools, capability-plan y runner-capabilities.
    Batch E completado: Pi developer-team install, Supermemory gate removal y prompt cleanup.
    Batch F completado: tests/verificación Apply y parity e2e.
  verify_review_findings: |
    Verify y Review se ejecutaron en registry-deferred mode y el Orchestrator registró los resultados de forma serial.
    Rondas iniciales encontraron fallos change-related de typecheck, prueba/enforcement de MCP healthcheck gating, prompt stub, registry statuses/códigos, silent packages y texto stale en apply-progress.
    Repairs #2-#5 y final verify cleanup corrigieron los blockers: production path healthcheck-gated MCP config integrado, developer-team tests pasan, changed-area typecheck focused pass y apply-progress queda sin pending stale.
    Verify final: PASS WITH WARNINGS; Review final: PASS. Listo para Archive.
  repair_7_findings: |
    Repair #7 ejecuta limpieza de archivos legacy SDD y prepara flujo de instalación:
    - Legacy SDD files (sdd-apply.md, sdd-design.md, etc.) en .pi/agent/agents/ causan command leakage
    - MCP config no se escribe automáticamente durante install - requiere re-instalación del usuario
    - Settings.json tiene @dreki-gg/pi-context7 (stale) en lugar de @upstash/context7-mcp
    - Skills instalados en .pi/agent/skills/ (incorrecto) en lugar de .pi/skills/ (correcto)
    Fix aplicado: cleanupLegacySddAgentFiles() integrado en applyDeveloperTeamInstall
    Estado: código listo, requiere re-instalación de usuario para aplicar fixes
  repair_8_findings: |
    Repair #8 completa el flujo de instalación de packages:
    - Handler de write-pi-mcp-config en runner-adapter.ts ahora escribe MCP config para todas las capacidades
    - writeContextModeMcpConfig, writeCodebaseMemoryMcpConfig, writeSerenaMcpConfig, writeContext7McpConfig ahora se invocan
    - context7 usa @upstash/context7-mcp estándar (no @dreki-gg/pi-context7)
    - Stale package en settings.json requiere corrección manual por usuario
    Estado: flujo de package install ahora escribe MCP config correctamente
  repair_9_findings: |
    Repair #9 implementa reemplazo automático de stale packages:
    - Nueva función mergeSettingsPackages() detecta y reemplaza stale @dreki-gg/pi-context7
    - Integrada después de cada install-pi-package en runner-adapter.ts
    - 6 tests verifican el reemplazo automático
    - Usuario NO necesita editar manualmente settings.json
    Estado: completo, sin manual edit requerida
  repair_10_findings: |
    Repair #10 asegura que la instalación ES y SOLO es a través de la TUI:
    - Comandos directos `deck pi install ...` NO existen en parser CLI
    - Agregadas dependencias installInternalRunnerPackages y piCommand en TUI app.tsx
    - mergeSettingsPackages ahora se invoca después de install en flujo TUI
    - Actualizado apply-progress.md con instrucciones TUI-only
    Estado: completo, TUI-only install path verificado
  repair_11_findings: |
    Repair #11 ejecuta limpieza extendida de legacy SDD y nested skills:
    - LEGACY_SDD_AGENT_FILES ahora incluye sdd-proposal, sdd-sync
    - Agregada limpieza wildcard para cualquier sdd-*.md no en lista explícita
    - Nueva función cleanupNestedSkillDirectories() maneja ~/.pi/agent/skills/SKILL.md/SKILL.md
    - Integrada en applyDeveloperTeamInstall con nestedSkillDirsRemoved en resultado
    Estado: completo, requiere re-test TUI
  repair_12_findings: |
    Repair #12 ejecuta dos fixes críticos:
    1. codebase-memory-mcp duplicate install: Cuando se seleccionan ambas capacidades (codebase-memory Y codebase-memory-mcp), el plan generaba dos acciones de install. La segunda fallaba porque OpenCode no tiene toolId "codebase-memory-mcp" - solo tiene "codebase-memory". Fix: Agregado CAPABILITY_ALIASES para detectar cuando la capability fuente está ready y omitir el install del alias.
    2. MCP config writes faltantes: El plan no generaba acciones write-pi-mcp-config para las capabilities con MCP (context-mode, codebase-memory-mcp, serena, context7) cuando ya estaban instaladas (status=ready). Fix: Agregado CAPABILITIES_WITH_MCP_CONFIG y lógica para generar config-write actions independientemente del status de instalación.
    - context7 ya usaba @upstash/context7-mcp correctamente en capability-catalog.ts y action-runner.ts
    - settings-merge.ts ya reemplaza @dreki-gg/pi-context7 automáticamente
    Estado: completo, requiere re-test TUI para verificar nuevos contadores de acciones
  repair_13_findings: |
    Repair #13 remueve la duplicación de codebase-memory/codebase-memory-mcp en Pi TUI:
    1. Removido `codebase-memory` del catálogo de capabilities de Pi (capability-catalog.ts)
    2. Mantenido solo `codebase-memory-mcp` como capability visible/installable
    3. Actualizado installation-plan.ts para solo tener tool `codebase-memory-mcp`
    4. Removido workaround de CAPABILITY_ALIASES (ya no necesario)
    5. Actualizado state.ts para default selectedCapabilities con solo codebase-memory-mcp
    6. Actualizados todos los tests relevantes
    - MCP config escribe server name "codebase-memory" (no "codebase-memory-mcp") para paridad con OpenCode
    - El binary usado es codebase-memory-mcp (definido en la capability)
    Estado: completo, tests pasan
  repair_14_findings: |
    Repair #14 arregla visibilidad de Serena en el TUI de paquetes Pi:
    1. Problema: Serena no era visible en la lista de paquetes del TUI
    2. Causa raíz: serena tenía requirementLevel: "required" en capability-catalog.ts. La función getToggleableCapabilityIds() filtra solo por "configurable" y "optional", excluyendo "required"
    3. Fix: Cambiado requirementLevel de serena de "required" a "configurable"
    4. Resultado: serena ahora aparece en la lista de paquetes del TUI y permanece preseleccionado por defecto
    5. Tests: capability-catalog 14 pass, capability-plan 29 pass, reducer 12 pass, input-handler 4 pass
    Estado: completo
  repair_15_findings: |
    Repair #15 asegura que MCP config se persista después de installs exitosas en el flujo TUI:
    1. Problema: MCP config (mcp.json) solo tenía supermemory; faltaban context-mode, codebase-memory-mcp, serena, context7
    2. Causa raíz: La TUI usaba adapter.writeMcpConfig que solo escribe supermemory. No invocaba el handler write-pi-mcp-config del adapter
    3. Fix: Custom writeMcpConfig en app.tsx que detecta Pi y llama a adapter.runAction() para write-pi-mcp-config
    4. Fix: Agregado logging de contadores y post-install verification en app.tsx
    5. Fix: Agregado logging en action-runner.ts para configWrites
    Estado: completo, requiere re-test TUI
  repair_16_findings: |
    Repair #16 repara routing de instalación Pi y título del dashboard:
    1. Problema: UI muestra "OpenCode Runner capability dashboard" mientras body dice "Pi"
    2. Problema: Pi install-pi-package usa OpenCode catalog → 0 matches → falla
    3. Causa raíz: Título hardcodeado en línea 2584; installPackages siempre usa OPENCODE_INSTALLABLE_TOOLS
    4. Fix: Cambiado título a "Pi Runner Setup Dashboard"; installPackages ahora detecta runner y delega a adapter
    5. Tests: 4 regression tests agregados verificando routing correcto
    Estado: completo, requiere re-test TUI
  repair_17_findings: |
    Repair #17 repara installKind en el flujo de instalación de Pi:
    1. Problema: adapter.runAction() hardcodeaba installKind como "pi-package" para todas las tools
    2. Problema: context-mode, codebase-memory-mcp, rtk, serena fallaban porque usaban installKind incorrecto
    3. Causa raíz: runner-adapter.ts líneas 223-230 hardcodeaban installKind: "pi-package"
    4. Fix: Ahora lookup la tool metadata completa desde PI_INSTALLABLE_TOOLS usando toolId
    5. Fix: Usa catalogTool?.installKind en lugar del valor hardcodeado
    6. Fix: Preserva capabilityId desde el catálogo para tracking de paridad
    7. Fix: Importado getPiInstallableTool desde installation-plan.ts
    Estado: completo, requiere re-test TUI
  repair_18_findings: |
    Repair #18 repara dispatch de installKind en installPiTools():
    1. Problema: installPiTools() ignoraba completamente installKind y siempre ejecutaba "pi install"
    2. Problema: result statuses (reused, installed, manual-verified) se mapearon incorrectamente a "failed"
    3. Causa raíz: install-tools.ts líneas 39-100 no tenían lógica de dispatch por installKind
    4. Fix: Nueva función dispatchInstallByKind que hace switch por installKind:
       - shared-binary/shared-binary-plus-mcp: usa installSharedBinary con healthcheck
       - python-tool: usa installSerena (uv/pipx)
       - npm-package-plus-mcp: ejecuta npx -y <package>
       - pi-package: ejecuta pi install <source>
    5. Fix: Status mapping corregido en runner-adapter.ts
    6. Fix: Logging mejorado con campo installKind en resultado
    7. Fix: 8 nuevos tests verificando dispatch correcto
    Estado: completo, tests pasan
  repair_19_findings: |
    Repair #19 repara configWrites, console.log leakage y action-runner routing:
    1. Problema: capability-plan ya genera configWrites para capacidades MCP; la lógica es correcta
    2. Problema: console.log en install-tools.ts línea 88 filtra en TUI de Ink
    3. Problema: action-runner.ts línea 604 verificaba capabilityId === "codebase-memory" incorrecto
    4. Problema: writeMcpConfigAction no soportaba fallback writeSupermemoryPiMcpConfig
    5. Fix: Eliminado console.log en install-tools.ts:88
    6. Fix: Corregido capabilityId check a "codebase-memory-mcp"
    7. Fix: Agregado fallback writeSupermemoryPiMcpConfig → writeMcpConfig en action-runner
    8. Fix: Agregado gating para write-pi-mcp-config en configWrites processing
    9. Fix: Test install-tools actualizado para verificar NO hay logging "[install-tools]"
    Tests: capability-plan (29 pass), install-tools (18 pass), action-runner (pre-existing failures)
  repair_20_findings: |
    Repair #20 repara persistencia de MCP config, async bug en model config, y path canónico:
    1. Problema: MCP config solo tiene supermemory; faltan context-mode, codebase-memory-mcp, serena, context7
    2. Problema: model config parece no persistir - escrito en ~/.pi/agent/agents pero leído de proyecto .pi/agents
    3. Problema: applyDeveloperTeamModelConfig() es async pero llamado SIN await - syncDashboard llamado antes de que termine
    4. Fix: Añadido await a llamadas applyDeveloperTeamModelConfig() en app.tsx líneas 1645, 1651, 1656
    5. Fix: Corregido readModelAssignments y readThinkingAssignments en runner-adapter.ts para usar ~/.pi/agent/agents (no proyecto)
    6. Fix: Agregado logging detallado en runner-adapter.ts write-pi-mcp-config handler para debug
    7. Fix: Agregada escritura de supermemory en write-pi-mcp-config handler (antes solo se hacía en write-mcp-config)
    Tests: pi-mcp-config (29 pass), model-config (34 pass), developer-team (57 pass, 7 fail pre-existentes)
  repair_21_findings: |
    Repair #21 repara path canonicalization, logging hygiene y MCP persistence:
    1. BLOCKER-1 Path canonicalization: readDeveloperTeamModelConfigAssignments recibía projectRoot y añadía .pi/agents, causando doble ruta (~/.pi/agent/agents/.pi/agents/)
       Fix: Agregado parámetro agentsDir opcional en ReadDeveloperTeamModelAssignmentsOptions
       Fix: readModelAssignments y readThinkingAssignments en runner-adapter.ts ahora pasan agentsDir explícito
    2. BLOCKER-2 Logging hygiene: console.log en runner-adapter.ts y install-tools.ts filtraban en TUI Ink
       Fix: Eliminados TODOS console.log de runner-adapter.ts (write-pi-mcp-config handler)
       Fix: Eliminado console.log de install-tools.ts línea 125
    3. BLOCKER-3 MCP persistence: ~/.pi/agent/mcp.json solo tenía supermemory
       Fix: write-pi-mcp-config handler ya escribe todos los servidores (verified en tests)
    Tests: runner-adapter.test.ts (5 pass), pi-mcp-config.test.ts (29 pass), install-tools.test.ts (18 pass), build pass
  repair_22_findings: |
    Repair #22 repara generación de configWrites para capacidades MCP:
    1. PROBLEMA: ~/.pi/agent/mcp.json solo tenía supermemory; faltaban context-mode, codebase-memory-mcp, serena, context7
       Log: configWrites=2, solo adaptive-memory.supermemory.pi-mcp-config:executed
    2. CAUSA RAÍZ (tres bugs combinados):
       a. context7 estaba en EXCLUDED_PLAN_TERMS (capability-plan.ts línea 81) → acciones filtradas
       b. Generación de config-write dentro de if (!entry || entry.status === "ready") → no generaba para statuses distintos
       c. action-runner.ts mapeaba capabilityId incorrecto: "codebase-memory-mcp" → verificaba "codebase-memory"
    3. FIX APLICADOS:
       a. Removido "context7" de EXCLUDED_PLAN_TERMS
       b. Movida generación de config-write fuera del bloque condicional (ahora genera para TODAS las capacidades seleccionadas)
       c. Corregido mapeo en action-runner.ts: "codebase-memory-mcp" → "codebase-memory-mcp"
    4. TESTS AGREGADOS: 2 nuevos tests verificando generación de configWrites para capacidades MCP
    5. TESTS ACTUALIZADOS: capability-plan.test.ts línea 144-163 ahora verifica context7 NO excluido
    Tests: capability-plan.test.ts (31 pass), runner-adapter.test.ts (5 pass), action-runner.test.ts (13 pass), TypeScript 0 errors, build pass
  repair_22_review_findings: |
    Review focused de Repair #22: PASS WITH WARNINGS (approved_with_changes).
    3/3 bugs raíz de Repair #22 cerrados con evidencia de código:
    1. context7 removido de EXCLUDED_PLAN_TERMS (capability-plan.ts:81).
    2. config-write generation movido fuera del if (!entry || entry.status === "ready") (capability-plan.ts:216-229).
    3. action-runner.ts:195 mapping corregido a "codebase-memory-mcp" → "codebase-memory-mcp".
    2/2 failing tests añadidos primero (capability-plan.test.ts:168, 208) y pasan.
    108/108 tests relevantes pasan (capability-plan 31, action-runner 13, pi-mcp-config 29, install-tools 18, runner-adapter 5, capability-inventory 12).
    18 tests preexistentes fallando (7 adapter-pi developer-team-install, 11 TUI supermemory/pi-mermaid) — NO relacionados a Repair #22.
    Sin console.log leakage. Logging higiene verificada.
    Hallazgos: 0 CRITICAL, 1 MAJOR, 2 MINOR, 2 ADVISORY.
    MAJOR-1: serverName de codebase-memory inconsistente entre action-runner.ts:619 (usa "codebase-memory-mcp") y pi-mcp-config.ts:13 constante CODEBASE_MEMORY_MCP_SERVER_NAME="codebase-memory". Puede causar entrada duplicada en mcp.json.
    MINOR-1: runner-adapter.ts:317-378 re-escribe 5 servers en cada llamada a write-pi-mcp-config (no respeta action.capabilityId).
    MINOR-2: app.tsx:817 rama "codebase-memory" muerta (nunca emitida por capability-catalog).
    Outcome: success. Usuario puede re-testear. Confidence 85% (Major #1 es la única reserva).
    Required fixes before retest: ninguno. Required fix before archive: MAJOR-1.
  repair_23_findings: |
    Repair #23 corrige inconsistencias de serverName codebase-memory entre action-runner y adapter-pi:
    1. PROBLEMA: action-runner.ts:619 usaba serverName="codebase-memory-mcp" mientras pi-mcp-config.ts:13 define CODEBASE_MEMORY_MCP_SERVER_NAME="codebase-memory"
    2. CAUSA RAÍZ: El código en action-runner tenía hardcodeado el serverName incorrecto
    3. FIX APLICADOS:
       a. Importado CODEBASE_MEMORY_MCP_SERVER_NAME desde @deck/adapter-pi en action-runner.ts
       b. Cambiado serverName de "codebase-memory-mcp" a CODEBASE_MEMORY_MCP_SERVER_NAME en línea 620
       c. Agregado test verificando que capabilityId codebase-memory-mcp escribe con serverName="codebase-memory"
    4. TESTS: action-runner.__tests__ (14 pass), pi-mcp-config (29 pass)
    5. TYPECHECK: 0 errores en archivos modificados
    Estado: completo, listo para re-test de usuario
