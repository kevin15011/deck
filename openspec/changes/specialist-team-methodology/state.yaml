description: Analizar metodología de equipo de especialistas vs fases SDD
key_findings:
  - catalog.ts ya define equipo de 14 agentes
  - SDD vs Role-Based Delegation existe pero no enfatiza equipo como base
  - SDD phase order lista Proposal primero, no Explorer - cambio críticas necesario
  - wording de delegación predispose a especialista único
  - Invariants (INV-001 a INV-005) deben preservarse
risks:
  - regtests breaking en orchestrator-*.test.ts por cambio de wording
  - regresión en triage si wording cambia incorrectamente
proposal_decisions:
  - Developer Team debe encuadrarse como equipo de especialistas, no SDD primero
  - Orchestrator debe coordinar, routear y sintetizar con conocimiento explícito del roster
  - Triage debe permitir Direct / Specialist(s) / Recommend SDD / Run SDD
  - Specialist(s) puede involucrar uno o más especialistas y paralelismo seguros
  - Run SDD debe respetar flujo formal con Explorer antes de Proposal
spec_summary:
  requirements: 25
  acceptance_scenarios: 15
  open_questions: 2
  key_requirements:
    - Equipo de especialistas como identidad base, no SDD-default
    - Triage preserva Direct / Specialist(s) / Recommend SDD / Run SDD
    - Specialist(s) permite uno o más especialistas sin sesgo singular
    - Paralelismo seguro sin dependencias ni conflictos
    - Run SDD exige Explorer como primera fase y orden completo sin omisiones
design_summary:
  risk_level: medium
  files_estimated: 6 modify + 2 unchanged/optional
  key_decisions:
    - Specialist only se redefine conceptualmente como Specialist(s)
    - Orchestrator se refrasea como coordinador/router/sintetizador de especialistas
    - Se recomienda considerar una invariant mínima para proteger Explorer-first
    - Se preservan registry-deferred, Apply routing y configuración de modelos
