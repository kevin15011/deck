- event: model-correction
  phase: proposal
  timestamp: "2026-05-23"
  agent: deck-developer-orchestrator
  summary: >
    Architecture model corrected after user clarification:
    - Adapter does NOT make HTTP calls to Supermemory server
    - Adapter generates instruction content (markdown) that tells agents HOW/WHEN/WHY to use Supermemory MCP tools
    - Agent makes MCP calls directly to Supermemory server based on injected instructions
    - buildInjection() must generate content without requiring authenticatedRuntimeValidated
    - authenticatedRuntimeValidated only gates health probe, not instruction generation

