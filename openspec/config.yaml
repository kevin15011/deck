schema: spec-driven
initialized: true
last_index: "2026-05-25T11:23:00Z"
index_mode: full

context: |
  Tech stack: TypeScript, Bun (runtime + package manager), React, Ink (CLI TUI)
  Architecture: Monorepo (apps/cli, packages/core, packages/adapter-*)
  Testing: Bun built-in test runner (bun:test), ~70 test files
  Style: ES2022, ESNext modules, strict TypeScript, no explicit linter/formatter

rules:
  proposal:
    - Include rollback plan for risky changes
    - Respect existing active change boundaries
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: true
    test_command: "bun test"
  verify:
    test_command: "bun test"
    build_command: ""
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas

testing:
  strict_tdd: true
  runner:
    framework: bun
    command: "bun test"
  layers:
    unit:
      available: true
      tool: bun:test
    integration:
      available: true
      tool: bun:test
      description: |
        Contract tests for runner-install flow using mocked dependencies.
        Validates install sequencing and gating without real I/O.
    e2e:
      available: true
      tool: bun:test
      description: |
        E2E-ish TUI tests using render-only pattern.
        Tests preflight → install → artifact verification without real installs or network.
  strict_tdd_gates:
    - focused_preflight_tests: "bun test packages/adapter-pi/src/preflight.test.ts packages/adapter-opencode/src/preflight.test.ts"
    - contract_tests: "bun test apps/cli/src/tui/runner-dashboard/__tests__/runner-install-contract.test.ts"
    - e2e_ish_tests: "bun test apps/cli/src/tui/__tests__/runner-install-e2e.test.tsx"
    - baseline_ledger_comparison: "openspec/baseline-health.yaml"
  baseline_health:
    ledger: openspec/baseline-health.yaml
    policy: |
      - Focused commands must pass for change closure
      - New failures in repo-wide commands block closure
      - Known failures require explicit ledger reference
      - Pass with warnings requires documented known failures
  security_constraints: |
    - No real installations performed
    - No network calls in test gates
    - No user filesystem writes
    - Deterministic mocks for all external dependencies
  coverage:
    available: true
    command: "bun test --coverage"
  quality:
    linter:
      available: false
      command: ""
    type_checker:
      available: true
      command: "tsc --noEmit"
    formatter:
      available: false
      command: ""
